<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Steppe · AI Vocabulary Trainer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  :root{
    --bg-top:#0c1022;
    --bg-bottom:#2a1c34;
    --surface:#191f37;
    --surface-soft:#222a48;
    --surface-line: rgba(255,255,255,0.07);
    --gold:#e0a847;
    --gold-soft: rgba(224,168,71,0.16);
    --teal:#5fd0c0;
    --coral:#e8694f;
    --text:#f3efe6;
    --text-muted:#9aa3bf;
    --text-dim:#6b7390;
    --radius:18px;
    --radius-sm:12px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Inter','Manrope',system-ui,sans-serif;
    color:var(--text);
    background: linear-gradient(180deg, var(--bg-top) 0%, #19142b 55%, var(--bg-bottom) 100%);
    min-height:100vh;
    -webkit-tap-highlight-color: transparent;
    overflow-x:hidden;
  }
  /* faint horizon glow */
  body::before{
    content:"";
    position:fixed; left:0; right:0; bottom:0; height:40vh;
    background: radial-gradient(120% 100% at 50% 100%, rgba(224,168,71,0.10), transparent 70%);
    pointer-events:none; z-index:0;
  }
  #app{
    position:relative; z-index:1;
    max-width:520px; margin:0 auto;
    min-height:100vh;
    display:flex; flex-direction:column;
    padding-bottom: calc(92px + var(--safe-bottom));
  }
  h1,h2,h3{font-family:'Manrope',sans-serif; margin:0; letter-spacing:-0.01em;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit;}
  a{color:inherit;}
  ::selection{background:var(--gold-soft);}

  /* ---------- header ---------- */
  .topbar{
    padding:22px 20px 14px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .topbar .date{
    font-size:13px; color:var(--text-muted); font-family:'IBM Plex Mono',monospace;
    letter-spacing:0.02em;
  }
  .topbar .brand{
    font-size:15px; font-weight:800; color:var(--text);
    display:flex; align-items:center; gap:7px;
  }
  .topbar .brand .dot{width:7px;height:7px;border-radius:50%;background:var(--gold); box-shadow:0 0 8px var(--gold);}
  .streak-chip{
    display:flex; align-items:center; gap:5px;
    background:var(--surface-soft); border:1px solid var(--surface-line);
    padding:5px 11px; border-radius:999px; font-size:13px; font-weight:600;
    font-family:'IBM Plex Mono',monospace;
  }

  /* ---------- tab content ---------- */
  .view{padding:4px 20px 28px; animation: fadeUp .35s ease both;}
  @media (prefers-reduced-motion: reduce){ .view{animation:none;} }
  @keyframes fadeUp{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);}}

  .section-label{
    display:flex; align-items:baseline; justify-content:space-between;
    margin: 22px 2px 12px;
  }
  .section-label .t{font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:0.09em; color:var(--text-muted);}
  .section-label .n{font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--gold);}

  /* ---------- sun arc (signature element) ---------- */
  .sun-wrap{display:flex; align-items:center; gap:16px; margin: 6px 2px 4px; padding: 16px; background:var(--surface); border:1px solid var(--surface-line); border-radius:var(--radius);}
  .sun-wrap svg{flex-shrink:0;}
  .sun-wrap .copy .title{font-size:15px; font-weight:700;}
  .sun-wrap .copy .sub{font-size:13px; color:var(--text-muted); margin-top:3px; line-height:1.4;}

  /* ---------- flashcards ---------- */
  .card-scene{
    perspective:1400px; margin-bottom:14px;
  }
  .card{
    position:relative; width:100%; min-height:172px;
    transform-style:preserve-3d;
    transition:transform .5s cubic-bezier(.2,.8,.2,1);
    cursor:pointer;
  }
  .card.flipped{transform:rotateY(180deg);}
  .face{
    position:absolute; inset:0; width:100%; height:100%;
    backface-visibility:hidden;
    border-radius:var(--radius);
    background:var(--surface);
    border:1px solid var(--surface-line);
    padding:18px 18px 16px;
    display:flex; flex-direction:column;
  }
  .face.back{transform:rotateY(180deg); background:linear-gradient(160deg, var(--surface) 0%, #261c3e 100%);}
  .face .top-row{display:flex; align-items:flex-start; justify-content:space-between; gap:10px;}
  .face .tag{font-size:11px; color:var(--text-dim); font-family:'IBM Plex Mono',monospace; text-transform:uppercase; letter-spacing:0.06em;}
  .face .word{font-family:'Manrope',sans-serif; font-weight:800; font-size:27px; margin-top:8px; line-height:1.15;}
  .face .mn{font-family:'Manrope',sans-serif; font-weight:700; font-size:21px; margin-top:8px; line-height:1.3; color:var(--gold);}
  .face .example{font-size:13px; color:var(--text-muted); margin-top:12px; line-height:1.5; font-style:normal; background:var(--surface-soft); border:1px solid var(--surface-line); border-radius:10px; padding:10px 12px;}
  .face .example .ex-label{color:var(--teal); font-weight:700; font-family:'IBM Plex Mono',monospace; font-size:10px; text-transform:uppercase; letter-spacing:0.06em; display:block; margin-bottom:4px;}
  .face .example .ex-text{color:var(--text); font-size:14px; line-height:1.45;}
  .face .pron{font-size:13px; color:var(--teal); margin-top:10px; font-family:'IBM Plex Mono',monospace;}
  .face .spacer{flex:1;}
  .face .btn-row{display:flex; align-items:center; gap:8px; margin-top:10px;}
  .icon-btn{
    width:36px; height:36px; border-radius:50%;
    background:var(--surface-soft); border:1px solid var(--surface-line);
    display:flex; align-items:center; justify-content:center; font-size:16px;
    flex-shrink:0;
  }
  .icon-btn:active{transform:scale(0.92);}
  .icon-btn.fav.active{background:var(--gold-soft); color:var(--gold); border-color:var(--gold);}
  .tap-hint{font-size:11px; color:var(--text-dim); margin-left:auto; font-family:'IBM Plex Mono',monospace;}
  .skeleton-line{display:inline-block; width:90px; height:13px; border-radius:6px; background:linear-gradient(90deg, var(--surface-soft), var(--surface-line), var(--surface-soft)); background-size:200% 100%; animation:shimmer 1.4s infinite;}
  @keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}

  /* ---------- buttons ---------- */
  .btn-primary{
    width:100%; padding:15px; border-radius:var(--radius-sm);
    background:var(--gold); color:#1a1306; font-weight:700; font-size:15px;
    text-align:center; margin-top:18px;
    transition:opacity .2s, transform .15s;
  }
  .btn-primary:active{transform:scale(0.98);}
  .btn-primary[disabled]{opacity:0.4; pointer-events:none;}
  .btn-ghost{
    width:100%; padding:13px; border-radius:var(--radius-sm);
    background:var(--surface-soft); color:var(--text); font-weight:600; font-size:14px;
    text-align:center; border:1px solid var(--surface-line);
  }
  .pill-row{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:18px;}
  .pill{
    padding:9px 15px; border-radius:999px; font-size:13px; font-weight:600;
    background:var(--surface-soft); border:1px solid var(--surface-line); color:var(--text-muted);
  }
  .pill.active{background:var(--gold-soft); color:var(--gold); border-color:var(--gold);}

  /* ---------- empty state ---------- */
  .empty{
    text-align:center; padding:40px 20px; background:var(--surface); border:1px dashed var(--surface-line);
    border-radius:var(--radius); margin-top:10px;
  }
  .empty .e-icon{font-size:32px; margin-bottom:10px;}
  .empty .e-title{font-weight:700; font-size:16px; margin-bottom:6px;}
  .empty .e-sub{font-size:13px; color:var(--text-muted); line-height:1.5;}

  /* ---------- quiz ---------- */
  .quiz-card{
    background:var(--surface); border:1px solid var(--surface-line); border-radius:var(--radius);
    padding:26px 20px; text-align:center; margin-bottom:16px; min-height:120px;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
  }
  .quiz-card .q-eyebrow{font-size:12px; color:var(--text-dim); font-family:'IBM Plex Mono',monospace; text-transform:uppercase; letter-spacing:0.07em; margin-bottom:10px;}
  .quiz-card .q-main{font-family:'Manrope',sans-serif; font-weight:800; font-size:25px;}
  .quiz-card .q-sub{margin-top:6px; color:var(--text-muted); font-size:14px;}
  .listen-big{
    width:64px; height:64px; border-radius:50%; background:var(--gold-soft); color:var(--gold);
    border:1px solid var(--gold); display:flex; align-items:center; justify-content:center; font-size:26px; margin:0 auto;
  }
  .opt-grid{display:grid; gap:10px;}
  .opt{
    padding:15px; border-radius:var(--radius-sm); background:var(--surface-soft); border:1px solid var(--surface-line);
    font-size:15px; font-weight:600; text-align:left;
  }
  .opt.correct{background:rgba(95,208,192,0.16); border-color:var(--teal); color:var(--teal);}
  .opt.wrong{background:rgba(232,105,79,0.16); border-color:var(--coral); color:var(--coral);}
  .opt[disabled]{pointer-events:none;}
  .quiz-progress{display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--text-muted);}
  .quiz-bar{height:4px; border-radius:2px; background:var(--surface-soft); margin-bottom:18px; overflow:hidden;}
  .quiz-bar .fill{height:100%; background:var(--gold); transition:width .3s;}
  .score-screen{text-align:center; padding:30px 10px;}
  .score-screen .big-num{font-family:'IBM Plex Mono',monospace; font-size:52px; font-weight:600; color:var(--gold);}
  .score-screen .label{color:var(--text-muted); margin-top:6px; font-size:14px;}

  /* ---------- progress tab ---------- */
  .stat-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:6px;}
  .stat-box{background:var(--surface); border:1px solid var(--surface-line); border-radius:var(--radius-sm); padding:14px;}
  .stat-box .num{font-family:'IBM Plex Mono',monospace; font-size:24px; font-weight:600; color:var(--gold);}
  .stat-box .lbl{font-size:12px; color:var(--text-muted); margin-top:3px;}
  .search-bar{
    display:flex; align-items:center; gap:8px; background:var(--surface-soft); border:1px solid var(--surface-line);
    border-radius:var(--radius-sm); padding:11px 14px; margin:18px 0 12px;
  }
  .search-bar input{
    flex:1; background:none; border:none; color:var(--text); font-size:14px; outline:none; font-family:inherit;
  }
  .search-bar input::placeholder{color:var(--text-dim);}
  .word-row{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    padding:13px 14px; background:var(--surface); border:1px solid var(--surface-line); border-radius:var(--radius-sm);
    margin-bottom:8px;
  }
  .word-row .w-en{font-weight:700; font-size:15px;}
  .word-row .w-mn{font-size:13px; color:var(--text-muted); margin-top:2px;}
  .status-dot{width:9px; height:9px; border-radius:50%; flex-shrink:0;}
  .status-dot.learned{background:var(--teal);}
  .status-dot.pending{background:var(--text-dim);}
  .cat-tag{font-size:10px; color:var(--text-dim); font-family:'IBM Plex Mono',monospace;}

  /* ---------- modal ---------- */
  .overlay{
    position:fixed; inset:0; background:rgba(8,9,18,0.6); backdrop-filter:blur(3px);
    display:flex; align-items:flex-end; justify-content:center; z-index:50;
    animation:fadeUp .2s ease both;
  }
  .sheet{
    width:100%; max-width:520px; background:var(--surface); border-radius:22px 22px 0 0;
    padding:22px 20px calc(26px + var(--safe-bottom)); border:1px solid var(--surface-line);
  }
  .sheet .sheet-title{font-weight:800; font-size:18px; margin-bottom:16px;}
  .field{margin-bottom:14px;}
  .field label{font-size:12px; color:var(--text-muted); display:block; margin-bottom:6px; font-family:'IBM Plex Mono',monospace;}
  .field input{
    width:100%; padding:13px 14px; background:var(--surface-soft); border:1px solid var(--surface-line);
    border-radius:var(--radius-sm); color:var(--text); font-size:15px; outline:none; font-family:inherit;
  }
  .field input:focus{border-color:var(--gold);}
  .sheet-actions{display:flex; gap:10px; margin-top:6px;}
  .sheet-actions .btn-ghost, .sheet-actions .btn-primary{margin-top:0;}

  /* ---------- toast ---------- */
  #toast{
    position:fixed; bottom:96px; left:50%; transform:translateX(-50%) translateY(20px);
    background:var(--surface-soft); border:1px solid var(--surface-line); color:var(--text);
    padding:12px 18px; border-radius:999px; font-size:13px; font-weight:600;
    opacity:0; pointer-events:none; transition:opacity .25s, transform .25s; z-index:60;
    max-width:88%; text-align:center; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  #toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  /* ---------- tab bar ---------- */
  .tabbar{
    position:fixed; left:12px; right:12px; bottom:calc(10px + var(--safe-bottom)); z-index:40;
    max-width:496px; margin:0 auto;
    background:rgba(20,24,42,0.86); backdrop-filter:blur(18px) saturate(160%);
    border:1px solid var(--surface-line); border-radius:20px;
    box-shadow:0 12px 32px rgba(0,0,0,0.28);
    display:flex; padding:6px;
  }
  [data-theme="light"] .tabbar{ background: rgba(255,255,255,0.86); box-shadow:0 12px 28px rgba(60,45,10,0.14); }
  .tabbar .tab{
    flex:1; padding:10px 0 8px; display:flex; flex-direction:column; align-items:center; gap:3px;
    font-size:10.5px; color:var(--text-dim); font-weight:700; border-radius:14px;
    transition: background .2s ease, color .2s ease;
  }
  .tabbar .tab .ic{font-size:19px; transition: transform .2s cubic-bezier(.2,.8,.2,1);}
  .tabbar .tab.active{color:var(--gold); background:var(--gold-soft);}
  .tabbar .tab.active .ic{transform:translateY(-1px);}
  .tabbar .tab:active .ic{transform:scale(0.88);}
  @media (max-width:360px){
    .tabbar .tab{font-size:9.5px;}
    .tabbar .tab .ic{font-size:17px;}
  }

  /* ---------- theme toggle ---------- */
  .theme-toggle{
    width:34px; height:34px; border-radius:50%;
    background:var(--surface-soft); border:1px solid var(--surface-line);
    display:flex; align-items:center; justify-content:center; font-size:15px; flex-shrink:0;
  }
  .theme-toggle:active{transform:scale(0.92);}

  /* ---------- light mode palette ---------- */
  :root[data-theme="light"]{
    --bg-top:#f8f3e6;
    --bg-bottom:#ecdec0;
    --surface:#ffffff;
    --surface-soft:#f2ecdd;
    --surface-line: rgba(30,24,10,0.10);
    --gold:#b3771e;
    --gold-soft: rgba(179,119,30,0.14);
    --teal:#178f78;
    --coral:#c14f36;
    --text:#28230f;
    --text-muted:#6b6249;
    --text-dim:#948a6b;
  }
  [data-theme="light"] body::before{
    background: radial-gradient(120% 100% at 50% 100%, rgba(179,119,30,0.10), transparent 70%);
  }
  [data-theme="light"] .tabbar{ background: rgba(255,255,255,0.92); }
  [data-theme="light"] .overlay{ background: rgba(40,32,10,0.35); }
  [data-theme="light"] .btn-primary{ color:#fffaf0; }

  /* ---------- midnight blue palette ---------- */
  :root[data-theme="midnight"]{
    --bg-top:#050a17;
    --bg-bottom:#0c1a33;
    --surface:#0e1730;
    --surface-soft:#16213f;
    --surface-line: rgba(140,170,255,0.10);
    --gold:#5b8def;
    --gold-soft: rgba(91,141,239,0.16);
    --teal:#4fd1c5;
    --coral:#e8694f;
    --text:#eaf0ff;
    --text-muted:#8fa0c9;
    --text-dim:#5c6a8f;
  }
  [data-theme="midnight"] body::before{
    background: radial-gradient(120% 100% at 50% 100%, rgba(91,141,239,0.12), transparent 70%);
  }

  /* ---------- forest green palette ---------- */
  :root[data-theme="forest"]{
    --bg-top:#0a140f;
    --bg-bottom:#122a1c;
    --surface:#122018;
    --surface-soft:#1a2e22;
    --surface-line: rgba(160,220,180,0.10);
    --gold:#7fbf6a;
    --gold-soft: rgba(127,191,106,0.16);
    --teal:#4fbfa8;
    --coral:#d97a53;
    --text:#eef5ec;
    --text-muted:#93ab99;
    --text-dim:#5f7566;
  }
  [data-theme="forest"] body::before{
    background: radial-gradient(120% 100% at 50% 100%, rgba(127,191,106,0.12), transparent 70%);
  }
  [data-theme="forest"] .btn-primary, [data-theme="midnight"] .btn-primary{ color:#0a1108; }

  /* ---------- example translation (back of card) ---------- */
  .ex-text-mn{display:block; margin-top:5px; color:var(--text-dim); font-size:12px; line-height:1.4;}

  /* ---------- spelling test ---------- */
  .spelling-wrap{background:var(--surface); border:1px solid var(--surface-line); border-radius:var(--radius); padding:16px; margin-bottom:14px;}
  .spelling-input-row{display:flex; align-items:center; gap:10px;}
  .spelling-input{
    flex:1; padding:13px 14px; background:var(--surface-soft); border:1px solid var(--surface-line);
    border-radius:var(--radius-sm); color:var(--text); font-size:18px; outline:none; font-family:'IBM Plex Mono',monospace;
    letter-spacing:0.03em;
  }
  .spelling-input:focus{border-color:var(--gold);}
  .spelling-input[disabled]{opacity:0.7;}
  .spelling-count{font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--text-muted); flex-shrink:0;}
  .spelling-hint{display:flex; gap:6px; flex-wrap:wrap; margin-top:14px; justify-content:center;}
  .spelling-hint .hl{
    min-width:22px; text-align:center; font-family:'IBM Plex Mono',monospace; font-size:18px; font-weight:700;
    padding-bottom:4px; border-bottom:2px solid var(--surface-line);
  }
  .spelling-hint .hl.first{color:var(--teal); border-color:var(--teal);}
  .spelling-hint .hl.last{color:var(--text-dim); border-color:var(--text-dim);}
  .spelling-hint .hl.wrong{color:var(--coral); border-color:var(--coral);}
  .spelling-answer{text-align:center; color:var(--text-muted); font-size:14px; margin-bottom:8px;}
  .spelling-answer b{color:var(--teal);}

  /* ---------- topbar right cluster ---------- */
  .topbar-right{display:flex; align-items:center; gap:8px; position:relative;}

  /* ---------- theme dropdown ---------- */
  .theme-menu-wrap{position:relative;}
  .dropdown-panel{
    position:absolute; top:calc(100% + 10px); right:0; min-width:190px;
    background:var(--surface); border:1px solid var(--surface-line); border-radius:14px;
    box-shadow:0 14px 34px rgba(0,0,0,0.35); padding:8px; z-index:70;
    opacity:0; transform:translateY(-8px) scale(0.97); pointer-events:none;
    transition: opacity .2s ease, transform .2s cubic-bezier(.2,.8,.2,1);
    transform-origin: top right;
  }
  .dropdown-panel.open{opacity:1; transform:translateY(0) scale(1); pointer-events:auto;}
  .dropdown-panel .dd-label{font-size:11px; color:var(--text-dim); font-family:'IBM Plex Mono',monospace; text-transform:uppercase; letter-spacing:0.07em; padding:8px 10px 4px;}
  .dd-item{
    display:flex; align-items:center; gap:10px; width:100%; padding:10px 10px; border-radius:10px;
    font-size:14px; font-weight:600; color:var(--text); text-align:left;
  }
  .dd-item:active{transform:scale(0.98);}
  .dd-item .swatch{width:16px; height:16px; border-radius:50%; flex-shrink:0; border:1px solid var(--surface-line);}
  .dd-item.active{background:var(--gold-soft); color:var(--gold);}
  .dd-item.selected-check{margin-left:auto; color:var(--gold); font-size:12px;}
  .dd-divider{height:1px; background:var(--surface-line); margin:6px 2px;}

  /* ---------- profile menu ---------- */
  .profile-btn{
    width:34px; height:34px; border-radius:50%; background:var(--surface-soft); border:1px solid var(--surface-line);
    display:flex; align-items:center; justify-content:center; font-size:15px; flex-shrink:0;
  }
  .profile-btn:active{transform:scale(0.92);}
  .profile-panel{min-width:230px;}
  .profile-head{padding:10px 10px 12px; border-bottom:1px solid var(--surface-line); margin-bottom:6px;}
  .profile-head .p-email{font-size:13px; font-weight:700; color:var(--text); word-break:break-all;}
  .profile-head .p-plan{margin-top:6px; display:inline-flex; align-items:center; gap:5px; font-size:11px; font-weight:700; padding:4px 9px; border-radius:999px; font-family:'IBM Plex Mono',monospace; text-transform:uppercase; letter-spacing:0.05em;}
  .p-plan.free{background:var(--surface-line); color:var(--text-muted);}
  .p-plan.pro_eysh, .p-plan.pro_ielts{background:var(--gold-soft); color:var(--gold);}
  .p-plan.special{background:rgba(232,105,79,0.16); color:var(--coral);}
  .p-plan.premium{background:linear-gradient(90deg, rgba(224,168,71,0.22), rgba(95,208,192,0.22)); color:var(--gold);}
  .profile-guest-sub{font-size:12px; color:var(--text-muted); padding:2px 10px 10px;}

<div id="app"><div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:#9aa3bf;font-family:'IBM Plex Mono',monospace;font-size:13px;">

</div></div>

<script>
(function(){
"use strict";

/* =========================================================
   TIMEOUT HELPER
   HTTPS орчинд (жишээ нь GitHub Pages) зарим сүлжээний хүсэлт
   (ялангуяа Supabase auth/session) хариу өгөхгүй "гацах"
   тохиолдол гарвал init() мөнхөд зогсож, апп харанхуй хэвээр
   үлдэхээс сэргийлж, тодорхой хугацааны дараа автоматаар
   цуцалж, fallback утга буцаана.
   ========================================================= */
function withTimeout(promise, ms, label){
  return new Promise(function(resolve){
    var done = false;
    var timer = setTimeout(function(){
      if(done) return;
      done = true;
      console.warn("[steppe] timeout: "+label+" ("+ms+"ms) — үргэлжлүүлж байна");
      resolve(null);
    }, ms);
    Promise.resolve(promise).then(function(v){
      if(done) return;
      done = true;
      clearTimeout(timer);
      resolve(v);
    }, function(err){
      if(done) return;
      done = true;
      clearTimeout(timer);
      console.error("[steppe] error in "+label, err);
      resolve(null);
    });
  });
}

/* =========================================================
   DATA
   Үгс "words.json" файлаас fetch хийгдэж ачаална (код дотор
   хатуу бичихгүй). Файл нь дараах бүтэцтэй байна:
   { "A1_A2":[{en,mn,example_en,example_mn}...], "B1_B2":[...],
     "EYESH":[...], "C1_C2":[...], "IELTS":[...] }
   ========================================================= */
const WORDS_JSON_URL = "./words.json";

/* =========================================================
   БАГЦ (SUBSCRIPTION PLAN) БҮТЭЦ
   Тухайн агуулгын багц (word pack) аль plan-уудад нээлттэйг
   "unlocks" массивт жагсаана. Хэрэглэгчийн идэвхтэй plan энэ
   жагсаалтад байвал тухайн үгийн багц нээлттэй болно.
   ========================================================= */
const PLAN_ORDER = ["free","pro_eysh","pro_ielts","special","premium"];
const TIER_LABEL = {
  free:"Үнэгүй",
  pro_eysh:"Pro (ЭЕШ)",
  pro_ielts:"Pro (IELTS)",
  special:"Special",
  premium:"Premium"
};
/* Өөрөө нэмэх үгийн лимит: 0 = нэмэх боломжгүй, Infinity = хязгааргүй */
const CUSTOM_WORD_LIMIT = {
  free: 0,
  pro_eysh: 20,
  pro_ielts: 20,
  special: 100,
  premium: Infinity
};
/* Захиалгын багц бүрийн агуулгын тодорхойлолт — Paywall болон "Багцууд" табанд ашиглана */
const PLAN_META = {
  free:      { label:TIER_LABEL.free,      desc:"A1–A2 түвшний 250 үг",                                          wordLimitLabel:"Өөрөө үг нэмэх боломжгүй" },
  pro_eysh:  { label:TIER_LABEL.pro_eysh,  desc:"B1–B2 (300) + ЭЕШ-ийн (300) үг",                                wordLimitLabel:"+20 үг хүртэл өөрөө нэмнэ" },
  pro_ielts: { label:TIER_LABEL.pro_ielts, desc:"B1–B2 (300) + IELTS-ийн (300) үг",                              wordLimitLabel:"+20 үг хүртэл өөрөө нэмнэ" },
  special:   { label:TIER_LABEL.special,   desc:"B1–B2 (300) + C1–C2 (350) үг",                                  wordLimitLabel:"+100 үг хүртэл өөрөө нэмнэ" },
  premium:   { label:TIER_LABEL.premium,   desc:"Pro-гийн бүх боломж (ЭЕШ+IELTS) + B1–B2 (300) + C1–C2 (400) үг", wordLimitLabel:"Хязгааргүй үг нэмнэ" }
};
/* Тухайн үгийн багц (агуулгын pack) аль plan-уудад нээлттэйг заана */
const PACK_META = {
  A1_A2:  { label:"A1–A2",  order:1, unlocks:["free","pro_eysh","pro_ielts","special","premium"] },
  B1_B2:  { label:"B1–B2",  order:2, unlocks:["pro_eysh","pro_ielts","special","premium"] },
  EYESH:  { label:"ЭЕШ",    order:3, unlocks:["pro_eysh","premium"] },
  IELTS:  { label:"IELTS",  order:4, unlocks:["pro_ielts","premium"] },
  C1_C2:  { label:"C1–C2",  order:5, unlocks:["special","premium"] },
  PREMIUM:{ label:"Premium",order:6, unlocks:["premium"] }
};
/* Түгжээтэй багц дээр дарахад санал болгох хамгийн тохирох plan (Paywall-д ашиглана) */
function packRecommendedTier(pack){
  var unlocks = (PACK_META[pack] && PACK_META[pack].unlocks) || ["premium"];
  var paid = unlocks.filter(function(p){ return p !== "free"; });
  return paid.length ? paid[0] : "premium";
}

var WORDS = [];          // fetch дууссаны дараа бөглөгдөнө
var TOTAL_DEFAULT = 0;
var WORDS_READY = false;

function isPackLocked(pack){
  var meta = PACK_META[pack];
  if(!meta) return false;
  return meta.unlocks.indexOf(STATE.plan) === -1;
}
function allPackIds(){
  return Object.keys(PACK_META).sort(function(a,b){ return PACK_META[a].order - PACK_META[b].order; });
}

async function loadWordsFromJson(){
  try{
    var ctrl = (typeof AbortController !== "undefined") ? new AbortController() : null;
    var timer = ctrl ? setTimeout(function(){ ctrl.abort(); }, 8000) : null;
    var res = await fetch(WORDS_JSON_URL, {cache:"no-store", signal: ctrl ? ctrl.signal : undefined});
    if(timer) clearTimeout(timer);
    if(!res.ok) throw new Error("words.json fetch failed: "+res.status);
    var data = await res.json();
    var out = [];
    var idx = 0;
    allPackIds().forEach(function(pack){
      var list = data[pack] || [];
      list.forEach(function(w){
        out.push({
          key: pack+"_"+idx,
          en: w.en, mn: w.mn,
          cat: PACK_META[pack].label,
          pack: pack,
          example_en: w.example_en || "",
          example_mn: w.example_mn || ""
        });
        idx++;
      });
    });
    WORDS = out;
  }catch(e){
    console.error("words.json ачаалахад алдаа гарлаа", e);
    WORDS = [];
  }
  TOTAL_DEFAULT = WORDS.length;
  WORDS_READY = true;
}

function getPerDay(){
  return STATE.dailyGoal || 10;
}
const REVIEW_PER_DAY = 5;
const QUIZ_LEN = 10;

/* =========================================================
   STORAGE HELPERS  (localStorage — хөтөч дээр хадгалагдана)
   ========================================================= */
async function sGet(key){
  try{
    var v = localStorage.getItem("steppe_"+key);
    return v !== null ? v : null;
  }catch(e){ return null; }
}
async function sSet(key, value){
  try{ localStorage.setItem("steppe_"+key, value); return true; }catch(e){ console.error("storage set failed", key, e); return false; }
}

function defaultProgress(){
  return {
    completedDays: 0,

    goalHitToday: false, // өнөөдөр зорилгодоо хүрсэн эсэхийг нэг л удаа тоолохын тулд
    lastGoalCheckDate: null,
    lastCompletionDate: null,
    streak: 0,
    learned: {},      // key -> {learnedDate, lastReview, reviewCount}
    favorites: {},    // key -> true
    customWords: [],  // {en, mn}
    quizStats: {}      // mode -> {attempts, correct}
  };
}

var STATE = {
  progress: defaultProgress(),
  enrich: {},        // key -> {cyrillic, example_en, example_mn}
  tab: "today",        // "today" | "quiz" | "progress" | "packs" | "profile"
  loading: true,
  todayFlip: {},     // key -> bool (flipped)
  quizSession: null,
  modal: null,        // null | "add" | "auth" | "paywall"
  searchQuery: "",
  learnedQuery: "",
  learnedFilterCat: "all",
  wordListPack: "all",
  packsOpenPack: null,  // Багцууд табан дээр нээгдсэн (нээлттэй) багцын id
  theme: "dark",       // "dark" | "light" | "midnight" | "forest"
  themeMenuOpen: false,
  user: null,          // Supabase auth хэрэглэгч (null = зочин)
  profileRole: "user", // "user" | "admin"
  plan: "free",        // "free" | "pro_eysh" | "pro_ielts" | "special" | "premium"
  planExpiresAt: null, // ISO огноо эсвэл null (хугацаагүй/free)
  planJustExpired: false, // энэ session-д хугацаа дуусаж free рүү шилжсэн эсэхийг Paywall мессежинд ашиглана
  dailyGoal: 10,       // Хэрэглэгчийн сонгосон "Өдрийн зорилго" (үг тоо) — profiles.daily_goal
  authMode: "signin",  // "signin" | "signup"
  authError: "",
  authBusy: false,
  paywallPack: null,   // тухайн үед хэрэглэгч ямар түгжээтэй багц дээр дарсныг санана
  paywallReason: null, // "custom_limit_free" | "custom_limit_pro" | "custom_limit_special" | "pack_locked" | "plan_expired" | null
  syncBusy: false,
  pricing: {},          // Supabase 'packages' хүснэгтээс уншина: tier -> {price3m, price1y, currency}
  pricingLoaded: false,
  admin: {              // Админ панелийн орон нутгийн төлөв
    loaded: false,
    loading: false,
    totalUsers: null,
    activeByPlan: {},

    grantEmail: "",

};

/* =========================================================
   SUPABASE
   Доорх хоёр утгыг өөрийн Supabase төслийн

const SUPABASE_URL = "https://thyprvqorwzoncszjqjy.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_kGNfrtE5joGdMJ8l7N57iw_Z8iSZybw";
var supa = null;
try{

/* =========================================================
   THEME
   ========================================================= */
const THEME_LIST = [
  {id:"light",    label:"Light",         swatch:"#f8f3e6"},

async function loadTheme(){

}

async function initAuth(){
  if(!supa) return;
  try{
    var res = await withTimeout(supa.auth.getSession(), 6000, "auth.getSession");
    var session = res && res.data ? res.data.session : null;
    if(session && session.user){
      STATE.user = session.user;
      await withTimeout(fetchProfilePlan(), 6000, "fetchProfilePlan");
      await withTimeout(pullRemoteProgress(), 6000, "pullRemoteProgress");
    }
    supa.auth.onAuthStateChange(function(event, session){
      STATE.user = session ? session.user : null;
      if(STATE.user){
        fetchProfilePlan().then(pullRemoteProgress).then(render);
      } else {
        STATE.plan = "free";
        render();
      }
    });
  }catch(e){ console.error("initAuth error", e); }
}

async function fetchProfilePlan(){
  if(!supa || !STATE.user) return;
  STATE.planJustExpired = false;
  try{
    var res = await supa.from("profiles")
      .select("plan, streak_count, role, plan_expires_at, daily_goal, goals_completed")
      .eq("id", STATE.user.id).single();
    var row = res.data;
    if(row){
      STATE.profileRole = row.role || "user";
      STATE.planExpiresAt = row.plan_expires_at || null;
      if(typeof row.daily_goal === "number" && [5,10,15,20].indexOf(row.daily_goal) !== -1){
        STATE.dailyGoal = row.daily_goal;
      }
      if(typeof row.goals_completed === "number" && row.goals_completed > STATE.progress.goalsCompleted){
        STATE.progress.goalsCompleted = row.goals_completed;
      }
      var plan = row.plan || "free";
      // РЕТЕНШН HOOK: багцын хугацаа дууссан эсэхийг шалгаж, дууссан бол автоматаар 'free' болгоно
      if(plan !== "free" && STATE.planExpiresAt && new Date(STATE.planExpiresAt).getTime() < Date.now()){
        plan = "free";
        STATE.planJustExpired = true;
        // Серверт бас тольдож бичих (дараагийн удаа дахин шалгах шаардлагагүй болгоно)
        supa.from("profiles").update({ plan: "free" }).eq("id", STATE.user.id).then(function(){}, function(){});
      }
      STATE.plan = plan;
    } else {
      STATE.plan = "free";
    }
    // profiles.streak_count нь админ/тайлангийн зориулалттай тольдсон утга;
    // бодит streak тооцоолол user_progress-д хадгалагдсан progress.streak-ээс гарна.
    if(row && typeof row.streak_count === "number" && row.streak_count > STATE.progress.streak){
      STATE.progress.streak = row.streak_count;
    }
  }catch(e){ console.error("fetchProfilePlan error", e); STATE.plan = "free"; }
}

/* Хэрэглэгчийн streak-ийг profiles.streak_count багана руу тольдож бичнэ.
   Ингэснээр админ Supabase дээрээс шууд streak-ийг харах боломжтой болно. */

  if(!supa || !STATE.user) return;

    await supa.from("profiles").update({ streak_count: STATE.progress.streak }).eq("id", STATE.user.id);

}

/* =========================================================
   PRICING  (Supabase 'packages' хүснэгтээс уншина)
   Хүснэгтийн бүтэц (санал): packages(
     tier text primary key,       -- free | pro_eysh | pro_ielts | special | premium
     price_3m int,                -- 3 сарын үнэ (₮), premium-д null байж болно
     price_1y int,                -- 1 жилийн үнэ (₮)
     currency text default '₮',
     description text
   )
   Админ Панель дээрх "Үнэ удирдах" формоос энэ хүснэгтийг шинэчилдэг тул
   өөрчлөгдмөгц хэрэглэгчийн 'Багцууд' таб болон Paywall дээр шууд харагдана.
   ========================================================= */
async function loadPricing(){
  if(!supa){ STATE.pricingLoaded = true; return; }
  try{
    var res = await withTimeout(supa.from("packages").select("tier, price_3m, price_1y, currency, description"), 6000, "loadPricing");
    if(res && res.data && res.data.length){
      res.data.forEach(function(row){
        STATE.pricing[row.tier] = {
          price3m: row.price_3m,
          price1y: row.price_1y,
          currency: row.currency || "₮",
          description: row.description || ""
        };
      });
    }
  }catch(e){ console.error("loadPricing error", e); }
  STATE.pricingLoaded = true;
}
function formatPrice(tier){
  var p = STATE.pricing[tier];
  if(tier === "free") return "Үнэгүй";
  if(!p) return "—";
  var cur = p.currency || "₮";
  var parts = [];
  if(p.price3m != null) parts.push(Number(p.price3m).toLocaleString("mn-MN")+cur+" / 3 сар");
  if(p.price1y != null) parts.push(Number(p.price1y).toLocaleString("mn-MN")+cur+" / 1 жил");
  return parts.length ? parts.join(" эсвэл ") : "—";
}

/* =========================================================
   PROGRESS  (localStorage + Supabase 'user_progress' sync)
   ========================================================= */
async function loadProgress(){
  var raw = await sGet("progress");
  if(raw){
    try{ STATE.progress = Object.assign(defaultProgress(), JSON.parse(raw)); }catch(e){ STATE.progress = defaultProgress(); }
  }
  var savedGoal = await sGet("dailyGoal");
  var g = parseInt(savedGoal,10);
  if(DAILY_GOAL_OPTIONS.indexOf(g) !== -1) STATE.dailyGoal = g;
}
async function saveProgress(){
  await sSet("progress", JSON.stringify(STATE.progress));
  await pushRemoteProgress();
  await syncStreakToProfile();
}

async function pushRemoteProgress(){
  if(!supa || !STATE.user) return;
  STATE.syncBusy = true;
  try{
    await supa.from("user_progress").upsert({
      user_id: STATE.user.id,
      progress: STATE.progress,
      updated_at: new Date().toISOString()
    });
  }catch(e){ console.error("pushRemoteProgress error", e); }
  STATE.syncBusy = false;
}

async function pullRemoteProgress(){
  if(!supa || !STATE.user) return;
  try{
    var res = await supa.from("user_progress").select("progress").eq("user_id", STATE.user.id).single();
    if(res.data && res.data.progress){
      // Сервер дээрх ахиц илүү шинэ гэж үзээд локал дээр нэгтгэнэ
      STATE.progress = Object.assign(defaultProgress(), STATE.progress, res.data.progress);
      await sSet("progress", JSON.stringify(STATE.progress));
    } else {
      // Серверт байхгүй бол одоогийн локал ахицаа анх удаа хадгалж авна
      await pushRemoteProgress();
    }
  }catch(e){ console.error("pullRemoteProgress error", e); }
}

/* =========================================================
   ӨӨРӨӨ ҮГ НЭМЭХ ЛИМИТ (Add Word Paywall Logic)
   ========================================================= */
function customWordCount(){ return STATE.progress.customWords.length; }
function customWordLimit(){
  var lim = CUSTOM_WORD_LIMIT[STATE.plan];
  return typeof lim === "number" ? lim : 0;
}
/* '+ Шинэ үг нэмэх' товч дарахад дуудагдана. Хэрэв нэмэх боломжтой бол true буцааж
   шууд Add modal нээнэ; боломжгүй бол тохирох Paywall шалтгаанаар нээгээд false буцаана. */
function checkAddWordAccess(){
  var plan = STATE.plan;
  var limit = customWordLimit();
  var used = customWordCount();

  if(plan === "free"){
    STATE.paywallReason = "custom_limit_free";
    STATE.paywallPack = null;
    STATE.modal = "paywall";
    render();
    return false;
  }
  if(limit !== Infinity && used >= limit){
    if(plan === "pro_eysh" || plan === "pro_ielts"){
      STATE.paywallReason = "custom_limit_pro";
    } else if(plan === "special"){
      STATE.paywallReason = "custom_limit_special";
    } else {
      STATE.paywallReason = "custom_limit_pro";
    }
    STATE.paywallPack = null;
    STATE.modal = "paywall";
    render();
    return false;
  }
  // Premium буюу лимитэд хүрээгүй бол шууд нэмэх modal нээнэ
  STATE.modal = "add";
  render();
  return true;
}
function paywallReasonMessage(){
  var r = STATE.paywallReason;
  if(r === "custom_limit_free") return "Үг нэмэхийн тулд багцаа ахиулна уу";
  if(r === "custom_limit_pro") return "Pro багцын лимит дүүрсэн";
  if(r === "custom_limit_special") return "Special багцын лимит дүүрсэн";
  if(r === "plan_expired") return "Таны багцын хугацаа дууссан тул суралтаа үргэлжлүүлэхийн тулд сунгана уу";
  if(r === "pack_locked") return "Энэ агуулгыг нээхийн тулд багцаа ахиулна уу";
  return "Илүү олон боломжийг ашиглахын тулд багцаа ахиулна уу";
}

var DAILY_GOAL_OPTIONS = [5,10,15,20];
async function setDailyGoal(n){
  n = parseInt(n,10);
  if(DAILY_GOAL_OPTIONS.indexOf(n) === -1) return;
  STATE.dailyGoal = n;
  await sSet("dailyGoal", String(n));
  if(supa && STATE.user){
    try{ await supa.from("profiles").update({ daily_goal:n }).eq("id", STATE.user.id); }
    catch(e){ console.error("setDailyGoal sync error", e); }
  }
  toast("🎯 Өдрийн зорилго "+n+" үг боллоо");
  render();
}
/* Хэрэглэгч тухайн өдөр шинээр цээжилсэн (эсвэл тестээр баталгаажуулсан) үгийн тоо */
function todayNewLearnedCount(){
  var today = todayStr();
  var n = 0;
  Object.keys(STATE.progress.learned).forEach(function(k){
    if(STATE.progress.learned[k].learnedDate === today) n++;
  });
  return n;
}
/* Өдрийн зорилгодоо хүрсэн эсэхийг шалгаад, шинээр хүрсэн бол goalsCompleted-ийг нэмэгдүүлнэ.
   Энэ функцийг markKnown болон completeDay дуудагдах бүрд дуудна. */
async function checkDailyGoalProgress(){
  var todayCount = todayNewLearnedCount();
  if(!STATE.progress.goalHitToday && todayCount >= STATE.dailyGoal){
    STATE.progress.goalHitToday = true;
    STATE.progress.goalsCompleted = (STATE.progress.goalsCompleted||0) + 1;
    toast("🎯 Өдрийн зорилго биелсэн! ("+STATE.progress.goalsCompleted+")");
    if(supa && STATE.user){
      try{ await supa.from("profiles").update({ goals_completed: STATE.progress.goalsCompleted }).eq("id", STATE.user.id); }
      catch(e){ console.error("goals_completed sync error", e); }
    }
  }
  // Шинэ өдөр эхлэхэд goalHitToday дахин false болгоно
  if(STATE.progress.lastGoalCheckDate !== todayStr()){
    STATE.progress.lastGoalCheckDate = todayStr();
    if(todayCount < STATE.dailyGoal) STATE.progress.goalHitToday = false;
  }
}

/* =========================================================
   WORD HELPERS
   ========================================================= */
var WORDS_BY_KEY = null;
function wordsIndex(){
  if(!WORDS_BY_KEY || WORDS_BY_KEY.__n !== WORDS.length){
    WORDS_BY_KEY = { __n: WORDS.length };
    WORDS.forEach(function(w){ WORDS_BY_KEY[w.key] = w; });
  }
  return WORDS_BY_KEY;
}
function allWords(){
  var custom = STATE.progress.customWords.map(function(w,i){
    return {key:"c"+i, en:w.en, mn:w.mn, cat:"Хувийн", pack:null};
  });
  return WORDS.concat(custom);
}
function unlockedWords(){
  return allWords().filter(function(w){ return !w.pack || !isPackLocked(w.pack); });
}
function totalWordCount(){ return TOTAL_DEFAULT + STATE.progress.customWords.length; }

function getWord(key){
  if(key.charAt(0) === "c"){
    var idx = parseInt(key.slice(1),10);
    var w = STATE.progress.customWords[idx];
    return w ? {key:key, en:w.en, mn:w.mn, cat:"Хувийн", pack:null} : null;
  }
  return wordsIndex()[key] || null;
}

function activeQueueWords(){
  // "Мэддэг" гэж тэмдэглэсэн, аль хэдийн цээжилсэн, эсвэл түгжээтэй багцын үгсийг идэвхтэй цувaанаас хасна
  return unlockedWords().filter(function(w){ return !STATE.progress.learned[w.key]; });
}
function todaysBatch(){
  var all = activeQueueWords();
  var perDay = getPerDay();
  // Цээжилээгүй үлдсэн үгсээс дараагийн perDay-г авна (аль хэдийн мэддэг/цээжилсэн
  // үгс автоматаар алгасагдана, learned дэх бичлэг устгагдахгүй тул урьдын ахиц хэвээр хадгалагдана)
  return all.slice(0, perDay);
}

function reviewBatch(){
  var keys = Object.keys(STATE.progress.learned);
  var todayKeys = {};
  todaysBatch().forEach(function(w){ todayKeys[w.key] = true; });
  keys = keys.filter(function(k){ return !todayKeys[k]; });
  keys.sort(function(a,b){
    var la = STATE.progress.learned[a], lb = STATE.progress.learned[b];
    var fa = STATE.progress.favorites[a] ? 1 : 0;
    var fb = STATE.progress.favorites[b] ? 1 : 0;
    if(fa !== fb) return fb - fa;
    return (la.lastReview||0) - (lb.lastReview||0);
  });
  return keys.slice(0, REVIEW_PER_DAY).map(getWord).filter(Boolean);
}

async function markKnown(key){
  if(STATE.progress.learned[key]) return;
  var w = getWord(key);
  STATE.progress.learned[key] = {learnedDate: todayStr(), lastReview: Date.now(), reviewCount:0};
  await checkDailyGoalProgress();
  await saveProgress();
  toast("✅ \""+(w?w.en:"")+"\" мэддэг үгэнд орлоо");
  render();
}

function isCompletedToday(){
  if(!STATE.progress.lastCompletionDate) return false;
  return STATE.progress.lastCompletionDate === todayStr();
}

function todayStr(){
  var d = new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}
function yesterdayStr(){
  var d = new Date(); d.setDate(d.getDate()-1);
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}
function formatDateMn(){
  var d = new Date();
  var months = ["1 сар","2 сар","3 сар","4 сар","5 сар","6 сар","7 сар","8 сар","9 сар","10 сар","11 сар","12 сар"];
  return d.getFullYear()+" оны "+months[d.getMonth()]+"ын "+d.getDate();
}

/* =========================================================
   AI ENRICHMENT
   ========================================================= */
async function ensureEnrichment(words){
  var need = [];
  for(var i=0;i<words.length;i++){
    var w = words[i];
    if(STATE.enrich[w.key]) continue;
    var cached = await sGet("enrich:"+w.key);
    if(cached){
      try{ STATE.enrich[w.key] = JSON.parse(cached); continue; }catch(e){}
    }
    need.push(w);
  }
  if(!need.length) return true;

  render(); // show skeletons while fetching

  var prompt = "Чи Монгол хэлээр Англи хэл сурдаг хүнд тусалдаг туслах. Доорх Англи үг бүрийг Кирилл бичигт " +
    "буулгасан ойролцоо дуудлагыг гаргаж өг (Монгол хүн уншиж шууд ойлгомжтой байх ёстой, жишээ нь \"mind\" -> \"майнд\"). " +
    "ЗӨВХӨН JSON массив буцаа. Markdown тэмдэглэгээ, тайлбар, нэмэлт текст бичихгүй. Формат:\n" +
    "[{\"i\":0,\"cyrillic\":\"...\"}]\n" +
    "Үгс:\n" +
    need.map(function(w,idx){ return idx+": "+w.en; }).join("\n");

  try{
    var res = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1000,
        messages: [{role:"user", content: prompt}]
      })
    });
    var data = await res.json();
    var text = (data.content||[]).map(function(b){ return b.text||""; }).join("");
    var clean = text.replace(/```json|```/g,"").trim();
    var arr = JSON.parse(clean);
    for(var j=0;j<arr.length;j++){
      var item = arr[j];
      var w2 = need[item.i];
      if(!w2) continue;
      var payload = {cyrillic:item.cyrillic||""};
      STATE.enrich[w2.key] = payload;
      await sSet("enrich:"+w2.key, JSON.stringify(payload));
    }
    return true;
  }catch(e){

/* =========================================================
   SPEECH
   ========================================================= */
var cachedVoice = null;
function pickVoice(){
  if(cachedVoice) return cachedVoice;
  var voices = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
  cachedVoice = voices.find(function(v){ return /en-US/i.test(v.lang); }) ||
                voices.find(function(v){ return /^en/i.test(v.lang); }) || null;
  return cachedVoice;
}
function speak(text){
  if(!window.speechSynthesis) return;
  try{
    window.speechSynthesis.cancel();
    var u = new SpeechSynthesisUtterance(text);
    u.lang = "en-US";
    u.rate = 0.92;
    var v = pickVoice();
    if(v) u.voice = v;
    window.speechSynthesis.speak(u);
  }catch(e){ console.error("speech failed", e); }
}
if(window.speechSynthesis){
  window.speechSynthesis.onvoiceschanged = function(){ cachedVoice = null; };
}

function toast(msg){

/* =========================================================
   RENDER : SHELL
   ========================================================= */
function esc(s){
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// Жишээ өгүүлбэр доторх сурч буй үгийг бүдүүн (bold) болгож тодруулна
function highlightWord(escapedSentence, word){
  var w = String(word||"").replace(/^to\s+/i,"").trim();
  if(!w || !escapedSentence) return escapedSentence;
  var escapedWord = w.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
  try{
    var re = new RegExp("\\b(" + escapedWord + ")\\w*", "ig");
    return escapedSentence.replace(re, function(m){ return "<b>"+m+"</b>"; });
  }catch(e){ return escapedSentence; }
}

    "<path d='M 6 34 A 26 26 0 0 1 58 34' fill='none' stroke='rgba(255,255,255,0.12)' stroke-width='5' stroke-linecap='round'/>" +

    "<circle cx='32' cy='"+(34-pct*22).toFixed(1)+"' r='5' fill='#e0a847'/>" +

   RENDER : QUIZ

function learnedWordObjs(){
  return Object.keys(STATE.progress.learned).map(getWord).filter(Boolean);
}

function startQuiz(mode){
  var pool = learnedWordObjs();
  if(pool.length < 4){
    toast("Эхлээд цуг сурсан үг хуримтлуулаарай (доод тал нь 4)");
    return;
  }
  var shuffled = pool.slice().sort(function(){ return Math.random()-0.5; });
  var len = Math.min(QUIZ_LEN, shuffled.length);
  STATE.quizSession = {
    mode: mode,
    queue: shuffled.slice(0, len),
    index: 0,
    correct: 0,
    answered: null,
    options: null,
    spellingInput: ""
  };
  buildQuizQuestion();
  render();
}

function buildQuizQuestion(){
  var s = STATE.quizSession;
  var w = s.queue[s.index];
  s.answered = null;
  if(s.mode === "spelling"){
    s.spellingInput = "";
    s.options = null;
    return;
  }

  // Сүүлийн 2 өдрийн цээжилсэн үгс (өнөөдөр + өчигдөр = 16 үг орчим)
  var today = todayStr();
  var yesterday = yesterdayStr();
  var recentKeys = Object.keys(STATE.progress.learned).filter(function(k){
    var ld = STATE.progress.learned[k];
    return ld.learnedDate === today || ld.learnedDate === yesterday;
  });
  var recentPool = recentKeys.map(getWord).filter(Boolean);

  // Хэрэв сүүлийн 2 өдрийн үг 4-өөс бага бол нийт үгийн сангаас нөхнө
  var fallbackPool = WORDS.concat(STATE.progress.customWords.map(function(c,i){
    return {key:"c"+i, en:c.en, mn:c.mn};
  }));
  var distPool = recentPool.length >= 4 ? recentPool : fallbackPool;

  var options;
  if(s.mode === "translate" || s.mode === "listen"){
    // Асуулт нь Англи үг → сонголтууд болон зөв хариулт нь МОНГОЛ байх ёстой
    var distractors = distPool.filter(function(x){
      return x.key !== w.key && x.mn !== w.mn;
    }).sort(function(){ return Math.random()-0.5; }).slice(0,3);
    options = distractors.map(function(d){ return {label:d.mn, correct:false}; });
    options.push({label:w.mn, correct:true});
  } else { // reverse
    // Асуулт нь Монгол үг → сонголтууд болон зөв хариулт нь АНГЛИ байх ёстой
    var distractors = distPool.filter(function(x){
      return x.key !== w.key && x.en !== w.en;
    }).sort(function(){ return Math.random()-0.5; }).slice(0,3);
    options = distractors.map(function(d){ return {label:d.en, correct:false}; });
    options.push({label:w.en, correct:true});
  }
  options.sort(function(){ return Math.random()-0.5; });
  s.options = options;
  s.answered = null;
}

function buildSpellingHint(word, typed){
  typed = typed || "";
  var out = [];
  for(var i=0;i<word.length;i++){
    if(i===0){
      out.push("<span class='hl first'>"+esc(word[i].toUpperCase())+"</span>");
      continue;
    }
    if(i===word.length-1){
      out.push("<span class='hl last'>"+esc(word[i].toUpperCase())+"</span>");
      continue;
    }
    var typedChar = typed.charAt(i);
    if(typedChar && typedChar.toLowerCase() !== word[i].toLowerCase()){
      out.push("<span class='hl wrong'>⛔</span>");
    } else {
      out.push("<span class='hl dash'>-</span>");
    }
  }
  return out.join("");
}

function submitSpelling(){
  var s = STATE.quizSession;
  if(!s || s.mode !== "spelling" || s.answered !== null) return;
  var w = s.queue[s.index];
  var typed = (s.spellingInput||"").trim();
  var correct = typed.length > 0 && typed.toLowerCase() === w.en.trim().toLowerCase();
  s.answered = correct;
  if(correct) s.correct++;
  render();
}

      "<button class='btn-ghost' data-action='exitQuiz' style='margin-top:10px;'>Шалгалтын цэс рүү буцах</button>" +
      "</div>";
  }
  var w = s.queue[s.index];
  var html = "";
  html += "<div class='quiz-progress'><span>"+(s.index+1)+" / "+s.queue.length+"</span><span>✓ "+s.correct+"</span></div>";
  html += "<div class='quiz-bar'><div class='fill' style='width:"+(100*s.index/s.queue.length)+"%'></div></div>";

  if(s.mode === "spelling"){
    var typed = s.spellingInput || "";
    html += "<div class='quiz-card'><div class='q-eyebrow'>Орчуулгыг харж англи үгийг бич</div><div class='q-main' style='font-size:21px;'>"+esc(w.mn)+"</div></div>";
    html += "<div class='spelling-wrap'>" +
      "<div class='spelling-input-row'>" +
        "<input id='spellingInput' class='spelling-input' type='text' autocomplete='off' autocapitalize='off' autocorrect='off' spellcheck='false' value='"+esc(typed)+"' "+(s.answered!==null?"disabled":"")+"/>" +
        "<span class='spelling-count'>"+typed.length+"/"+w.en.length+"</span>" +
      "</div>" +
      "<div class='spelling-hint'>"+buildSpellingHint(w.en, typed)+"</div>" +
    "</div>";
    if(s.answered === null){
      html += "<button class='btn-primary' data-action='submitSpelling'>Шалгах</button>";
    } else {
      if(!s.answered){
        html += "<div class='spelling-answer'>Зөв хариулт: <b>"+esc(w.en)+"</b></div>";
      }
      html += "<button class='btn-primary' data-action='nextQuiz'>"+(s.index+1 < s.queue.length ? "Дараах асуулт" : "Үр дүн харах")+"</button>";
    }
    return html;
  }

  if(s.mode === "translate"){
    html += "<div class='quiz-card'><div class='q-eyebrow'>Орчуулгыг сонго</div><div class='q-main'>"+esc(w.en)+"</div></div>";
  } else if(s.mode === "reverse"){
    html += "<div class='quiz-card'><div class='q-eyebrow'>Англи үгийг сонго</div><div class='q-main'>"+esc(w.mn)+"</div></div>";
  } else {
    html += "<div class='quiz-card'><div class='q-eyebrow'>Сонсож зөв үгийг сонго</div>" +
      "<button class='listen-big' data-action='listen' data-word='"+esc(w.en)+"'>🔊</button></div>";
  }

  html += "<div class='opt-grid'>";
  s.options.forEach(function(opt, i){
    var cls = "opt";
    var disabled = s.answered !== null ? "disabled" : "";
    if(s.answered !== null){
      if(opt.correct) cls += " correct";
      else if(i === s.answered && !opt.correct) cls += " wrong";
    }
    html += "<button class='"+cls+"' "+disabled+" data-action='answerQuiz' data-idx='"+i+"'>"+esc(opt.label)+"</button>";

  if(s.answered !== null){

  }
  return html;

function learnedCategories(){
  var cats = {};
  Object.keys(STATE.progress.learned).forEach(function(k){
    var w = getWord(k);
    if(w) cats[w.cat] = true;
  });
  return Object.keys(cats).sort();
}

function formatLearnedDate(ds){
  if(!ds) return "";
  var parts = ds.split("-");
  if(parts.length !== 3) return ds;
  var months = ["1-р сар","2-р сар","3-р сар","4-р сар","5-р сар","6-р сар","7-р сар","8-р сар","9-р сар","10-р сар","11-р сар","12-р сар"];
  var mi = parseInt(parts[1],10)-1;
  return parts[0]+" оны "+(months[mi]||parts[1])+"ын "+parseInt(parts[2],10);
}

// Сүүлийн 7 хоногийн турш өдөр бүр хэдэн үг цээжилсэнийг тоолно (жинхэнэ өгөгдлөөс)
function weeklyLearnedCounts(){
  var days = [];
  var labels = ["Ня","Да","Мя","Лх","Пү","Ба","Бя"];
  var counts = {};
  for(var i=6;i>=0;i--){
    var d = new Date(); d.setDate(d.getDate()-i);
    var key = d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
    days.push({key:key, label: labels[d.getDay()]});
    counts[key] = 0;
  }
  Object.keys(STATE.progress.learned).forEach(function(k){
    var ld = STATE.progress.learned[k].learnedDate;
    if(ld && counts.hasOwnProperty(ld)) counts[ld]++;
  });
  return days.map(function(d){ return {label:d.label, count: counts[d.key]}; });
}

function renderWeeklyChart(){
  var data = weeklyLearnedCounts();
  var max = Math.max(1, Math.max.apply(null, data.map(function(d){ return d.count; })));
  var bars = data.map(function(d){
    var h = Math.round((d.count/max)*64) + (d.count>0 ? 4 : 0);
    return "<div class='chart-col'>" +
      "<div class='chart-bar-track'><div class='chart-bar' style='height:"+h+"px'></div></div>" +
      "<div class='chart-n'>"+d.count+"</div>" +
      "<div class='chart-lbl'>"+d.label+"</div>" +
      "</div>";
  }).join("");
  return "<div class='chart-wrap'>" +
    "<div class='section-label' style='margin-top:0;'><div class='t'>Сүүлийн 7 хоног</div></div>" +
    "<div class='chart-bars'>"+bars+"</div></div>";
}

  });
  html += "</div>";

  var q = STATE.learnedQuery.trim().toLowerCase();
  var filtered = entries.filter(function(e){
    if(STATE.learnedFilterCat !== "all" && e.word.cat !== STATE.learnedFilterCat) return false;
    if(!q) return true;
    return e.word.en.toLowerCase().indexOf(q) >= 0 || e.word.mn.toLowerCase().indexOf(q) >= 0;
  }).sort(function(a,b){
    return (b.meta.learnedDate||"").localeCompare(a.meta.learnedDate||"");
  });

  filtered.forEach(function(e){
    var w = e.word, m = e.meta;

      ("<span class='ex-label'>Example</span><span class='ex-text'>"+highlightWord(esc(w.example_en), w.en)+"</span>" +

      "<div style='min-width:0;flex:1;display:flex;align-items:center;justify-content:space-between;gap:10px;'>" +

          "<div class='w-mn'>"+esc(w.mn)+"</div>" +

        "</div>" +

          "<button class='icon-btn' data-action='listen' data-word='"+esc(w.en)+"' title='Сонсох'>🔊</button>" +

        "</div>" +
      "</div>" +
      (learnedExampleBlock ? "<div class='example' style='width:100%; margin-top:10px;'>"+learnedExampleBlock+"</div>" : "") +
    "</div>";
  });

  if(!filtered.length){
    html += "<div class='empty'><div class='e-icon'>🔍</div><div class='e-title'>Илэрц олдсонгүй</div></div>";
  }
  return html;
}

function packWordStats(pack){
  var words = WORDS.filter(function(w){ return w.pack === pack; });
  var learned = words.filter(function(w){ return STATE.progress.learned[w.key]; }).length;
  return {total: words.length, learned: learned};
}

      render();
    });
  });

      render();
    });
  });

  document.querySelectorAll("[data-action='listen']").forEach(function(el){

  document.querySelectorAll("[data-action='learnedFilter']").forEach(function(el){

  document.querySelectorAll("[data-action='openPaywall']").forEach(function(el){

function answerQuiz(idx){
  var s = STATE.quizSession;
  if(s.answered !== null) return;
  s.answered = idx;
  if(s.options[idx].correct) s.correct++;
  render();
}

async function completeDay(){
  var batch = todaysBatch();
  var review = reviewBatch();
  var now = Date.now();
  batch.forEach(function(w){
    if(!STATE.progress.learned[w.key]){
      STATE.progress.learned[w.key] = {learnedDate: todayStr(), lastReview: now, reviewCount: 0};
    }
  });
  review.forEach(function(w){
    var L = STATE.progress.learned[w.key];
    if(L){ L.lastReview = now; L.reviewCount = (L.reviewCount||0)+1; }
  });

  var today = todayStr();
  if(STATE.progress.lastCompletionDate === yesterdayStr()){
    STATE.progress.streak += 1;
  } else if(STATE.progress.lastCompletionDate !== today){
    STATE.progress.streak = 1;
  }
  STATE.progress.lastCompletionDate = today;
  STATE.progress.completedDays += 1;
  STATE.todayFlip = {};
  await checkDailyGoalProgress();
  await saveProgress();
  toast("🔥 Өнөөдрийн зорилго биелсэн!");
  render();
}

async function saveCustomWord(){
  var en = document.getElementById("addEn").value.trim();
  var mn = document.getElementById("addMn").value.trim();
  if(!en || !mn){ toast("Үг болон орчуулгаа бөглөнө үү"); return; }
  STATE.progress.customWords.push({en:en, mn:mn});
  await saveProgress();
  STATE.modal = null;
  toast("✅ \""+en+"\" нэмэгдлээ");
  render();
}

function exportData(){
  try{
    var payload = {
      exportedAt: new Date().toISOString(),
      progress: STATE.progress,
      enrich: STATE.enrich
    };
    var blob = new Blob([JSON.stringify(payload, null, 2)], {type:"application/json"});
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = "steppe-vocab-backup-"+todayStr()+".json";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    toast("⬇️ Backup татагдлаа");
  }catch(e){
    console.error("export failed", e);
    toast("Backup татахад алдаа гарлаа");
  }
}

function handleImportFile(ev){
  var file = ev.target.files && ev.target.files[0];
  if(!file) return;
  var reader = new FileReader();
  reader.onload = async function(e){
    try{
      var data = JSON.parse(e.target.result);
      if(!data || typeof data !== "object") throw new Error("invalid backup file");
      var ok = window.confirm("Backup файлыг сэргээхэд одоогийн ахиц дарагдана. Үргэлжлүүлэх үү?");
      if(!ok) return;
      if(data.progress){
        await sSet("progress", JSON.stringify(data.progress));
      }
      if(data.enrich){
        var keys = Object.keys(data.enrich);
        for(var i=0;i<keys.length;i++){
          await sSet("enrich:"+keys[i], JSON.stringify(data.enrich[keys[i]]));
        }
      }
      toast("✅ Backup сэргээгдлээ. Дахин ачаалж байна...");
      setTimeout(function(){ location.reload(); }, 900);
    }catch(err){
      console.error("import failed", err);
      toast("⚠️ Файл уншихад алдаа гарлаа");
    }
  };
  reader.readAsText(file);
}

async function resetData(){
  var ok = window.confirm("Бүх ахиц, цээжилсэн үг болон тохиргоог устгахдаа итгэлтэй байна уу? Энэ үйлдлийг буцаах боломжгүй.");
  if(!ok) return;
  STATE.progress = defaultProgress();
  STATE.todayFlip = {};
  STATE.quizSession = null;
  await saveProgress();
  toast("🗑 Бүх дата цэвэрлэгдлээ");
  render();
}

/* =========================================================
   INIT
   ========================================================= */
var INIT_DONE = false;

async function init(){
  try{
    await withTimeout(loadTheme(), 5000, "loadTheme");
    await withTimeout(loadWordsFromJson(), 9000, "loadWordsFromJson");
    await withTimeout(loadProgress(), 5000, "loadProgress");
    await withTimeout(loadPricing(), 6000, "loadPricing");       // Багцын үнийг Supabase-ийн 'plans' хүснэгтээс уншина
    await withTimeout(initAuth(), 8000, "initAuth");              // Supabase session сэргээх, plan татах, ахиц татах
  }catch(e){
    console.error("[steppe] init() дотор гэнэтийн алдаа", e);
  }finally{
    // Юу ч болсон, апп харанхуй дэлгэц дээр гацахгүйн тулд
    // энэ мөрүүд ЗААВАЛ ажиллана.
    INIT_DONE = true;
    STATE.loading = false;
    try{ render(); }catch(e){ console.error("[steppe] render() алдаа", e); }
  }
  try{
    var batch = todaysBatch();
    var review = reviewBatch();
    await withTimeout(ensureEnrichment(batch.concat(review)), 15000, "ensureEnrichment");
    render();
  }catch(e){ console.error("[steppe] enrichment алдаа", e); }
}

/* ---------------------------------------------------------
   WATCHDOG: 10 секундын дотор init() дуусаагүй бол
   (жишээ нь withTimeout-той хамрагдаагүй гэнэтийн гацалт),
   хэрэглэгчийг харанхуй дэлгэц дээр орхихгүйн тулд
   апп-ыг хүчээр үзүүлнэ.
   --------------------------------------------------------- */
setTimeout(function(){
  if(!INIT_DONE){
    console.warn("[steppe] watchdog: init() 10 секундэд дуусаагүй тул хүчээр үргэлжлүүлж байна");
    STATE.loading = false;
    try{ render(); }catch(e){ console.error("[steppe] watchdog render алдаа", e); }
  }
}, 10000);

/* ---------------------------------------------------------
   Гар аргаар барьж амжаагүй алдаануудыг (унтраасан скрипт,
   гэнэтийн exception) бүртгэж, апп-ыг гацаахгүйн тулд.
   --------------------------------------------------------- */
window.addEventListener("error", function(ev){
  console.error("[steppe] global error", ev.error || ev.message);
});
window.addEventListener("unhandledrejection", function(ev){
  console.error("[steppe] unhandled promise rejection", ev.reason);
});

document.addEventListener("DOMContentLoaded", init);
if(document.readyState !== "loading") init();

})();
